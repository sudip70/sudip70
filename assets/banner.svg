<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2027"/>
      <stop offset="50%" style="stop-color:#203A43"/>
      <stop offset="100%" style="stop-color:#2C5364"/>
    </linearGradient>
    <clipPath id="wave-clip">
      <path d="M0,0 L900,0 L900,140 Q675,180 450,155 Q225,130 0,165 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="45" x2="900" y2="45"/>
    <line x1="0" y1="90" x2="900" y2="90"/>
    <line x1="0" y1="135" x2="900" y2="135"/>
    <line x1="225" y1="0" x2="225" y2="180"/>
    <line x1="450" y1="0" x2="450" y2="180"/>
    <line x1="675" y1="0" x2="675" y2="180"/>
  </g>

  <!-- Wave bottom -->
  <path d="M0,140 Q225,180 450,155 Q675,130 900,160 L900,180 L0,180 Z" fill="rgba(0,0,0,0.25)"/>
  <path d="M0,155 Q225,125 450,148 Q675,170 900,145 L900,180 L0,180 Z" fill="rgba(0,0,0,0.15)"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="40" r="2.5" fill="rgba(54,188,247,0.4)"/>
  <circle cx="100" cy="70" r="1.5" fill="rgba(54,188,247,0.25)"/>
  <circle cx="840" cy="50" r="2" fill="rgba(54,188,247,0.35)"/>
  <circle cx="800" cy="90" r="1.5" fill="rgba(54,188,247,0.2)"/>
  <circle cx="150" cy="120" r="1.5" fill="rgba(54,188,247,0.2)"/>
  <circle cx="760" cy="130" r="2" fill="rgba(54,188,247,0.3)"/>

  <!-- Name -->
  <text x="450" y="80" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff" letter-spacing="1">Sudip Shrestha</text>

  <!-- Subtitle -->
  <text x="450" y="118" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.75)" letter-spacing="0.5">AI/ML Engineer / Data Analyst  •  ML &amp; AI  •  Data Science</text>
</svg>
